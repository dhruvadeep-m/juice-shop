name: SCA Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install --ignore-scripts

      - name: Generate SBOM (CycloneDX)
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-file bom.json

      - name: Verify SBOM was created
        run: wc -c bom.json

      - name: Install Grype
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan SBOM → JSON report
        run: grype sbom:bom.json -o json > grype-report.json
        continue-on-error: true

      - name: Scan SBOM → SARIF report
        run: grype sbom:bom.json -o sarif > grype-results.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Security Dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: grype-results.sarif

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-bom
          path: bom.json

      - name: Upload Vulnerability Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: grype-report.json