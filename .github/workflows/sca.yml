name: SCA Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  sca:
    name: Software Composition Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install --ignore-scripts

      - name: Generate SBOM (CycloneDX)
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cyclonedx-npm --output-file bom.json

      - name: Verify SBOM was created
        run: wc -c bom.json

      - name: Install Grype
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan SBOM → JSON report
        run: grype sbom:bom.json -o json > grype-report.json
        continue-on-error: true

      - name: Generate HTML Vulnerability Report
        run: |
          python3 << 'EOF'
          import json

          with open('grype-report.json') as f:
              data = json.load(f)

          matches = data.get('matches', [])

          severity_color = {
              'Critical':  '#ff4444',
              'High':      '#ff8800',
              'Medium':    '#ffcc00',
              'Low':       '#4caf50',
              'Negligible':'#aaaaaa',
              'Unknown':   '#aaaaaa'
          }

          rows = ""
          for m in matches:
              vuln     = m.get('vulnerability', {})
              artifact = m.get('artifact', {})
              severity = vuln.get('severity', 'Unknown')
              color    = severity_color.get(severity, '#aaaaaa')
              fix_versions = vuln.get('fix', {}).get('versions', [])
              fix      = fix_versions[0] if fix_versions else 'No fix available'
              cve_id   = vuln.get('id', '')
              nvd_link = f"https://nvd.nist.gov/vuln/detail/{cve_id}"

              rows += f"""
              <tr>
                <td>{artifact.get('name', '')}</td>
                <td>{artifact.get('version', '')}</td>
                <td><a href="{nvd_link}" style="color:#4da6ff">{cve_id}</a></td>
                <td><span style="color:{color};font-weight:bold">{severity}</span></td>
                <td>{fix}</td>
              </tr>"""

          counts = {}
          for m in matches:
              s = m.get('vulnerability', {}).get('severity', 'Unknown')
              counts[s] = counts.get(s, 0) + 1

          severity_order = ['Critical', 'High', 'Medium', 'Low', 'Negligible', 'Unknown']
          summary = " &nbsp;|&nbsp; ".join(
              f"<span style='color:{severity_color.get(k,'#aaa')};font-weight:bold'>{k}: {counts[k]}</span>"
              for k in severity_order if k in counts
          )

          html = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Vulnerability Report</title>
            <style>
              body  {{ font-family: Arial, sans-serif; background:#1a1a1a; color:#fff; margin:30px; }}
              h1    {{ color:#ffffff; }}
              .meta {{ color:#aaaaaa; margin-bottom:20px; font-size:15px; }}
              table {{ border-collapse:collapse; width:100%; }}
              th    {{ background:#2d2d2d; padding:12px; text-align:left;
                       border-bottom:2px solid #444; color:#ccc; }}
              td    {{ padding:10px; border-bottom:1px solid #2d2d2d; font-size:14px; }}
              tr:hover {{ background:#242424; }}
              a     {{ text-decoration:none; }}
              a:hover {{ text-decoration:underline; }}
            </style>
          </head>
          <body>
            <h1>🔍 Vulnerability Report</h1>
            <p class="meta">
              Total vulnerabilities: <strong>{len(matches)}</strong>
              &nbsp;&nbsp;{summary}
            </p>
            <table>
              <tr>
                <th>Package</th>
                <th>Version</th>
                <th>CVE ID</th>
                <th>Severity</th>
                <th>Fix Version</th>
              </tr>
              {rows}
            </table>
          </body>
          </html>"""

          with open('vulnerability-report.html', 'w') as f:
              f.write(html)

          print(f"✅ Report generated — {len(matches)} vulnerabilities found")
          EOF

      - name: Scan Directory → SARIF report
        run: grype dir:. -o sarif > grype-results.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Security Dashboard
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: grype-results.sarif

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-bom
          path: bom.json

      - name: Upload Vulnerability Report (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report-json
          path: grype-report.json

      - name: Upload Vulnerability Report (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report-html
          path: vulnerability-report.html
      
      - name: Post Summary to Slack
        if: always()
        run: |
          python3 << 'EOF'
          import json, urllib.request

          with open('grype-report.json') as f:
              data = json.load(f)

          matches = data.get('matches', [])

          counts = {}
          by_severity = {}
          for m in matches:
              s = m.get('vulnerability', {}).get('severity', 'Unknown')
              counts[s] = counts.get(s, 0) + 1
              by_severity.setdefault(s, []).append(m)

          critical = counts.get('Critical', 0)
          high     = counts.get('High', 0)
          medium   = counts.get('Medium', 0)
          low      = counts.get('Low', 0)
          total    = len(matches)

          repo     = "${{ github.repository }}"
          actor    = "${{ github.actor }}"
          branch   = "${{ github.ref_name }}"
          run_url  = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          def build_vuln_lines(severity, emoji, limit=10):
              items = by_severity.get(severity, [])
              lines = []
              for m in items[:limit]:
                  vuln     = m.get('vulnerability', {})
                  artifact = m.get('artifact', {})
                  name     = artifact.get('name', '?')
                  version  = artifact.get('version', '?')
                  cve      = vuln.get('id', '?')
                  fix_list = vuln.get('fix', {}).get('versions', [])
                  fix      = fix_list[0] if fix_list else 'No fix'
                  lines.append(f"{emoji} *{name}* `{version}` — <https://nvd.nist.gov/vuln/detail/{cve}|{cve}> → fix: `{fix}`")
              if len(items) > limit:
                  lines.append(f"_...and {len(items) - limit} more {severity} vulnerabilities_")
              return "\n".join(lines) if lines else f"_No {severity} vulnerabilities_"

          critical_text = build_vuln_lines('Critical', '🔴')
          high_text     = build_vuln_lines('High', '🟠')

          blocks = [
              {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "🔍 SCA Vulnerability Report"}
              },
              {
                  "type": "section",
                  "fields": [
                      {"type": "mrkdwn", "text": f"*Repo:*\n{repo}"},
                      {"type": "mrkdwn", "text": f"*Branch:*\n{branch}"},
                      {"type": "mrkdwn", "text": f"*Triggered by:*\n{actor}"},
                      {"type": "mrkdwn", "text": f"*Total:*\n{total}"}
                  ]
              },
              {
                  "type": "section",
                  "fields": [
                      {"type": "mrkdwn", "text": f"🔴 *Critical:* {critical}"},
                      {"type": "mrkdwn", "text": f"🟠 *High:* {high}"},
                      {"type": "mrkdwn", "text": f"🟡 *Medium:* {medium}"},
                      {"type": "mrkdwn", "text": f"🟢 *Low:* {low}"}
                  ]
              },
              {"type": "divider"},
              {
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": f"*🔴 Critical Vulnerabilities*\n{critical_text}"}
              },
              {"type": "divider"},
              {
                  "type": "section",
                  "text": {"type": "mrkdwn", "text": f"*🟠 High Vulnerabilities*\n{high_text}"}
              },
              {"type": "divider"},
              {
                  "type": "context",
                  "elements": [
                      {"type": "mrkdwn", "text": f"<{run_url}|View full report + download artifacts>"}
                  ]
              }
          ]

          payload = {"blocks": blocks}

          req = urllib.request.Request(
              "${{ secrets.SLACK_WEBHOOK_URL }}",
              data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"}
          )
          urllib.request.urlopen(req)
          print("✅ Slack notification sent")
          EOF
